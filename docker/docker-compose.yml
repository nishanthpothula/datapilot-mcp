version: '3.9'

services:
  datapilot-mcp:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: datapilot-mcp
    restart: unless-stopped
    ports:
      - '${PORT:-3000}:3000'
    volumes:
      # Persist the SQLite database across container restarts
      - datapilot-data:/app/data
    environment:
      NODE_ENV: production
      PORT: 3000
      HOST: 0.0.0.0

      # Auth0 — set these in a .env file or via CI secrets
      AUTH0_DOMAIN: ${AUTH0_DOMAIN}
      AUTH0_AUDIENCE: ${AUTH0_AUDIENCE}
      AUTH0_CLIENT_ID: ${AUTH0_CLIENT_ID}
      AUTH0_CLIENT_SECRET: ${AUTH0_CLIENT_SECRET}

      # DCR
      DCR_REGISTRATION_SECRET: ${DCR_REGISTRATION_SECRET}

      # LangSmith
      LANGSMITH_API_KEY: ${LANGSMITH_API_KEY:-}
      LANGSMITH_PROJECT: ${LANGSMITH_PROJECT:-datapilot-mcp}
      LANGSMITH_TRACING: ${LANGSMITH_TRACING:-false}

      # Database
      DATABASE_PATH: /app/data/datapilot.db

      # CORS
      CORS_ORIGINS: ${CORS_ORIGINS:-*}
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://localhost:3000/health']
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

volumes:
  datapilot-data:
    name: datapilot-data
